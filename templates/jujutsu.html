<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Jujutsu Kaisen | Shadow.ca</title>

<style>

body{
    margin:0;
    background:#0b0814;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

#banner img{
    width:100%;
    display:block;
}

#titulo{
    text-align:center;
    padding:30px;
}

#titulo h1{
    color:#dcb6ff;
    margin-bottom:10px;
}

#catalogo{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    padding-bottom:50px;
}

article{
    width:280px;
    background:#1a1230;
    border:2px solid #7d3cff;
    border-radius:18px;
    padding:20px;
    text-align:center;
    transition:0.3s;
}

article:hover{
    transform:translateY(-5px);
    box-shadow:0px 0px 20px #7d3cff;
}

article img{
    width:100%;
    height:320px;
    object-fit:contain;
}

article h2{
    color:#dcb6ff;
    margin-top:15px;
    margin-bottom:10px;
}

article p{
    margin:8px 0;
}

#precio{
    font-size:22px;
    color:#ffffff;
    font-weight:bold;
}

#volver{
    text-align:center;
    padding-bottom:40px;
}

#volver a{
    background:#7d3cff;
    color:white;
    padding:12px 24px;
    text-decoration:none;
    border-radius:10px;
}

#volver a:hover{
    background:#9c63ff;
}

</style>

</head>

<body>

<div id="banner">

<img src="{{ url_for('static', filename='imagenes/banner.png') }}">

</div>

<div id="titulo">

<h1>Colección Jujutsu Kaisen</h1>

<p>Diseños exclusivos de Shadow.ca</p>

</div>

<div id="catalogo">

<article>

<img src="{{ url_for('static', filename='imagenes/higu.png') }}">

<h2>Higuruma</h2>

<p>Polera Oversize</p>

<p id="precio">$19.990</p>

<p>Tallas: M • L • XL</p>

</article>

<article>

<img src="{{ url_for('static', filename='imagenes/maho.png') }}">

<h2>Mahoraga</h2>

<p>Polera Oversize</p>

<p id="precio">$19.990</p>

<p>Tallas: M • L • XL</p>

</article>

</div>

<div id="volver">

<a href="{{ url_for('index') }}">Volver al inicio</a>

</div>

</body>

</html>
